n    [InlineData(\u0022abc\u0022, false)]\n    [InlineData(\u0022,.%$#@\u0022, false)]\n    [InlineData(\u0022\u0022, true)]\n    [InlineData(null, true)]\n    public void SuccessfulToValidateAnStringParameterAsPercentage(string input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.IsPercentage(input));\n    }\n    \n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate an string parameter as byte\u0022)]\n    [InlineData(\u0022123\u0022, true)]\n    [InlineData(\u0022abc123\u0022, false)]\n    [InlineData(\u0022,.%$#@\u0022, false)]\n    [InlineData(\u0022\u0022, true)]\n    [InlineData(null, true)]\n    [InlineData(\u0022256\u0022, false)]\n    public void SuccessfulToValidateAnStringParameterAsByte(string input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.IsByte(input));\n    }\n    \n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate an string parameter as integer\u0022)]\n    [InlineData(\u0022123\u0022, true)]\n    [InlineData(\u0022abc\u0022, false)]\n    [InlineData(\u0022abc123\u0022, false)]\n    [InlineData(\u0022,.%$#@\u0022, false)]\n    [InlineData(\u0022\u0022, true)]\n    [InlineData(null, true)]\n    [InlineData(\u0022NaN\u0022, false)]\n    public void SuccessfulToValidateAnStringParameterAsInteger(string input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.IsInteger(input));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate an string parameter as long\u0022)]\n    [InlineData(\u0022123\u0022, true)]\n    [InlineData(\u0022abc\u0022, false)]\n    [InlineData(\u0022abc123\u0022, false)]\n    [InlineData(\u0022,.%$#@\u0022, false)]\n    [InlineData(\u0022\u0022, true)]\n    [InlineData(null, true)]\n    [InlineData(\u0022NaN\u0022, false)]\n    public void SuccessfulToValidateAnStringParameterAsLong(string input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.IsLong(input));\n    }\n    \n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate an string parameter as float\u0022)]\n    [InlineData(\u0022123\u0022, true)]\n    [InlineData(\u0022123.45\u0022, true)]\n    [InlineData(\u0022abc\u0022, false)]\n    [InlineData(\u0022abc123\u0022, false)]\n    [InlineData(\u0022,.%$#@\u0022, false)]\n    [InlineData(\u0022\u0022, true)]\n    [InlineData(null, true)]\n    [InlineData(\u0022NaN\u0022, true)]\n    public void SuccessfulToValidateAnStringParameterAsFloat(string input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.IsFloat(input));\n    }\n    \n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate an string parameter as double\u0022)]\n    [InlineData(\u0022123\u0022, true)]\n    [InlineData(\u0022123.45\u0022, true)]\n    [InlineData(\u0022abc\u0022, false)]\n    [InlineData(\u0022abc123\u0022, false)]\n    [InlineData(\u0022,.%$#@\u0022, false)]\n    [InlineData(\u0022\u0022, true)]\n    [InlineData(null, true)]\n    [InlineData(\u0022NaN\u0022, true)]\n    public void SuccessfulToValidateAnStringParameterAsDouble(string input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.IsDouble(input));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate an string parameter as a valid url\u0022)]\n    [InlineData(\u0022/\u0022, false)]\n    [InlineData(\u0022www.google.com.br\u0022, false)]\n    [InlineData(\u0022ftp://www.google.com.br\u0022, false)]\n    [InlineData(\u0022http://www.google.com.br\u0022, true)]\n    [InlineData(\u0022https://www.google.com.br\u0022, true)]\n    [InlineData(\u0022\u0022, false)]\n    [InlineData(null, false)]\n    public void SuccessfulToValidateAnStringParameterAsAValidUrl(string input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.IsValidUri(input));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate duplicity over an object enumerable\u0022)]\n    [InlineData(new[] {1, 2, 2, 2}, true)]\n    [InlineData(new[] {1, 2, 3}, false)]\n    [InlineData(new int[] { }, false)]\n    public void SuccessfulToValidateDuplicityOverAnObjectEnumerable(IEnumerable\u003Cint\u003E input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.HasDuplicatedValues(input));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to validate duplicity over a null object\u0022)]\n    public void FailToValidateDuplicityOverANullObject()\n    {\n        // Arrange\n        // Act\n        ArgumentNullException exception =\n            Assert.Throws\u003CArgumentNullException\u003E(\n                () =\u003E ArgumentChecker.HasDuplicatedValues((IEnumerable\u003Cint\u003E) null)\n            );\n\n        // Assert\n        Assert.Equal(\u0022Value cannot be null. (Parameter \u0027source\u0027)\u0022, exception.Message);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate a date\u0022)]\n    [InlineData(\u00222021-04-23T10:00:01.000Z\u0022, true)]\n    [InlineData(\u00222021-13-32T25:61:61.000Z\u0022, false)]\n    [InlineData(\u0022\u0022, true)]\n    [InlineData(null, true)]\n    public void SuccessfulToValidateADate(string input, bool expected)\n    {\n        Assert.Equal(expected, ArgumentChecker.BeEmptyOrAValidDate(input));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate an enumeration\u0022)]\n    [InlineData(\u0022BLUE\u0022, true)]\n    [InlineData(\u \n                () =\u003E ArgumentValidator.CheckNullOrEmpty((IReadOnlyCollection\u003CDummyClass\u003E) null, \u0022dummyCollection\u0022, \u0022Dummy collection cannot be null\u0022)\n            );\n        Assert.Equal(\u0022Dummy collection cannot be null\u0022, exception.Message);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to validate an object list parameter if it is empty with custom message\u0022)]\n    public void FailToValidateAnObjectListParameterIfItIsEmptyWithCustomMessage()\n    {\n        // Arrange\n        // Act\n        // Assert\n        ArgumentException exception =\n            Assert.Throws\u003CArgumentException\u003E(\n                () =\u003E ArgumentValidator.CheckNullOrEmpty(new List\u003CDummyClass\u003E(), \u0022dummyCollection\u0022, \u0022Dummy collection cannot be empty\u0022)\n            );\n        Assert.Equal(\u0022Dummy collection cannot be empty\u0022, exception.Message);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to validate a string parameter if it is not null\u0022)]\n    public void SuccessfulToValidateAStringParameterIfItIsNotNull()\n    {\n        // Arrange\n        // Act\n        string result = ArgumentValidator.CheckEmpty(\u0022dummyString\u0022, \u0022dummyString\u0022);\n\n        // Assert\n        Assert.Equal(\u0022dummyString\u0022, result);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to validate a string parameter if it is null\u0022)]\n    public void FailToValidateAStringParameterIfItIsNull()\n    {\n        // Arrange\n        // Act\n        // Assert\n        ArgumentException exception =\n            Assert.Throws\u003CArgumentException\u003E(\n                () =\u003E ArgumentValidator.CheckEmpty(null, \u0022dummyString\u0022)\n            );\n        Assert.Equal(\u0022Value cannot be null or empty. (Parameter \u0027dummyString\u0027)\u0022, exception.Message);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to validate a string parameter if it is null with custom message\u0022)]\n    public void FailToValidateAStringParameterIfItIsNullWithCustomMessage()\n    {\n        // Arrange\n        // Act\n        // Assert\n        ArgumentException exception =\n            Assert.Throws\u003CArgumentException\u003E(\n                () =\u003E ArgumentValidator.CheckEmpty(null, \u0022dummy\u0022, \u0022Dummy cannot be empty\u0022)\n            );\n        Assert.Equal(\u0022Dummy cannot be empty\u0022, exception.Message);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate negative parameters\u0022)]\n    [InlineData(0)]\n    [InlineData(1)]\n    [InlineData(int.MaxValue)]\n    public void SuccessfulToValidateNegativeParameters(int input)\n    {\n        ArgumentValidator.CheckNegative(input, \u0022Input\u0022, $\u0022The {input} is not a valid positive integer\u0022);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Fail to validate negative parameters\u0022)]\n    [InlineData(int.MinValue)]\n    [InlineData(-1)]\n    public void FailToValidateNegativeParameters(int input)\n    {\n        // Arrange\n        // Act\n        // Assert\n        ArgumentException exception =\n            Assert.Throws\u003CArgumentException\u003E(\n                () =\u003E ArgumentValidator.CheckNegative(input, nameof(input), string.Empty)\n            );\n\n        Assert.Equal($\u0022Value cannot be negative. (Parameter \u0027{nameof(input)}\u0027)\u0022, exception.Message);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Fail to validate negative parameters with custom message\u0022)]\n    [InlineDa ro\u0022)]\n    [InlineData(-1, \u0022Input cannot be negative or equals to zero\u0022)]\n    public void FailToValidateNegativeOrZeroParametersWithCustomMessage(int input, string message)\n    {\n        // Arrange\n        // Act\n        // Assert\n        ArgumentException exception =\n            Assert.Throws\u003CArgumentException\u003E(\n                () =\u003E ArgumentValidator.CheckNegativeOrZero(input, nameof(input), message)\n            );\n\n        Assert.Equal(message, exception.Message);\n    }\n}","tests":[{"id":"7f034547-e598-4143-c407-2a002b195b04","name":"UnitTest.Core.Commons.ArgumentValidatorTest.SuccessfulToValidateAnObjectParameterIfItIsNotNull","location":{"start":{"line":11,"column":5},"end":{"line":23,"column":6}}},{"id":"9ddec145-21d3-3353-8fb3-4431e6fa5aa0","name":"UnitTest.Core.Commons.ArgumentValidatorTest.FailToValidateAnObjectParameterIfItIsNull","location":{"start":{"line":25,"column":5},"end":{"line":37,"column":6}}},{"id":"6499c165-8143-b91a-7521-dbc8ed69474c","name":"UnitTest.Core.Commons.ArgumentValidatorTest.FailToValidateAnObjectParameterIfItIsNullWithCustomMessage","location":{"start":{"line":39,"column":5},"end":{"line":51,"column":6}}},{"id":"67f7ae92-ef10-ad19-22e3-8daffd4ccdd9","name":"UnitTest.Core.Commons.ArgumentValidatorTest.SuccessfulToValidateAnObjectListParameterIfItIsNotNull","location":{"start":{"line":53,"column":5},"end":{"line":65,"column":6}}},{"id":"e6668e24-4c94-be76-40f9-61f32ff26c62","name":"UnitTest.Core.Commons.ArgumentValidatorTest.FailToValidateAnObjectListParameterIfItIsNull","location":{"start":{"line":67,"column":5},"end":{"line":79,"column":6}}},{"id":"33a4df99-d6a8-c418-61c8-890f6bc5c304","name":"UnitTest.Core.Commons.ArgumentValidatorTest.FailToValidateAnObjectListParameterIfItIsEmpty","location":{"start":{"line":81,"column":5},"end":{"line":93,"column":6}}},{"id":"a9293cc9-eded-b63f-4cbe-f12d36215f2d","name":"UnitTest.Core.Commons.ArgumentValidatorTest.FailToValidateAnObjectListParameterIfI ParametersWithCustomMessage","location":{"start":{"line":234,"column":5},"end":{"line":249,"column":6}}}]},"/home/runner/work/fms-balance-api-netcore/fms-balance-api-netcore/src/test/UnitTest.Core/Commons/EnumerationTest.cs":{"language":"cs","source":"using System.Linq;\nusing Core.Commons;\nusing UnitTest.Core.Commons.Models;\nusing Xunit;\n\nnamespace UnitTest.Core.Commons;\n\npublic sealed class EnumerationTest\n{\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to get all enumeration items\u0022)]\n    public void SuccessfulToGetAllEnumerationItems()\n    {\n        // Arrange\n        // Act\n        Color[] colors = Enumeration\u003CColor\u003E.GetAll().ToArray();\n\n        // Assert\n        Assert.Equal(5, colors.Length);\n        Assert.Contains(Color.Blue, colors);\n        Assert.Contains(Color.Green, colors);\n        Assert.Contains(Color.Yellow, colors);\n        Assert.Contains(Color.Red, colors);\n        Assert.Contains(Color.Black, colors);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to get enumeration item by name\u0022)]\n    public void SuccessfulToGetEnumerationItemByName()\n    {\n        // Arrange\n        // Act\n        Optional\u003CColor\u003E optional = Enumeration\u003CColor\u003E.GetByName(\u0022BLACK\u0022);\n\n        // Assert\n        Assert.True(optional.HasValue());\n\n        Color black = optional.GetValue();\n\n        Assert.Equal(\u0022BLACK\u0022, black.Name);\n        Assert.False(Color.Black.Equals(null));\n        Assert.Equal(Color.Black, black);\n        Assert.True(Color.Black.Equals(black));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to compare enumeration items\u0022)]\n    [InlineData(true, \u0022BLACK\u0022, \u0022BLACK\u0022)]\n    [InlineData(false, \u0022BLACK\u0022, \u0022RED\u0022)]\n    public void SuccessfulToCompareEnumerationItems(bool expected, string colorName1, string colorName2)\n    {\n        // Arrange\n        // Act\n        Optional\u003CColor\u003E optional1 = Enumeration\u003CColor\u003E.GetByName(colorName1);\n        Optional\u003CColor\u003E optional2 = Enumeration\u003CColor\u003E.GetByName(colorName2);\n\n        Assert.True(optional1.HasValue());\n        Assert.True(optional2.HasValue());\n\n        Color color1 = optional1.GetValue();\n        Color color2 = optional2.GetValue();\n\n        // Assert\n        Assert.Equal(expected, color1.Equals(color2));\n        Assert.Equal(expected, color1.GetHashCode().Equals(color2.GetHashCode()));\n        Assert.Equal(expected, color1.ToString()!.Equals(color2.ToString()));\n\n        Assert.Equal(expected, color1.Is(color2));\n        Assert.Equal(!expected, color1.IsNot(color2));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to get enumeration item by name\u0022)]\n    public void FailToGetEnumerationItemByName()\n    {\n        // Arrange\n        // Act\n        Optional\u003CColor\u003E optional = Enumeration\u003CColor\u003E.GetByName(\u0022PURPLE\u0022);\n\n        // Assert\n        Assert.False(optional.HasValue());\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to get enumeration item by name with null value\u0022)]\n    public void FailToGetEnumerationItemByNameWithNullValue()\n    {\n        // Arrange\n        // Act\n        Optional\u003CColor\u003E optional = Enumeration\u003CColor\u003E.GetByName(null);\n\n        // Assert\n        Assert.False(optional.HasValue());\n    }\n}","tests":[{"id":"7b1ae0fd-fcbe-9197-6b3e-32e5b2f2c37c","name":"UnitTest.Core.Commons.EnumerationTest.SuccessfulToGetAllEnumerationItems","location":{"start":{"line":10,"column":5},"end":{"line":25,"column":6}}},{"id":"0ae9fab5-4857-d7ed-c1e4-e4df72a3718d","name":"UnitTest.Core.Commons.EnumerationTest.SuccessfulToGetEnumerationItemByName","location":{"start":{"line":27,"column":5},"end":{"line":44,"column":6}}},{"id":"33b70472-f7e4-3a91-512d-a4b29ef501cc","name":"UnitTest.Core.Commons.EnumerationTest.SuccessfulToCompareEnumerationItems","location":{"start":{"line":46,"column":5},"end":{"line":70,"column":6}}},{"id":"33b89321-9059-28f3-c391-ef40e52efde9","name":"UnitTest.Core.Commons.EnumerationTest.SuccessfulToCompareEnumerationItems","location":{"start":{"line":46,"column":5},"end":{"line":70,"column":6}}},{"id":"6a59257c-8f4c-ccab-f3a5-84cfad411046","name":"UnitTest.Core.Commons.EnumerationTest.FailToGetEnumerationItemByName","location":{"start":{"line":72,"column":5},"end":{"line":82,"column":6}}},{"id":"e128b3f5-5b3e-0a63-dd41-53d73f559a4f","name":"UnitTest.Core.Commons.EnumerationTest.FailToGetEnumerationItemByNameWithNullValue","location":{"start":{"line":84,"column":5},"end":{"line":94,"column":6}}}]},"/home/runner/work/fms-balance-api-netcore/fms-balance-api-netcore/src/test/UnitTest.Core/Commons/Extensions/DictionaryExtensionsTest.cs":{"language":"cs","source":"using Core.Commons.Extensions;\nusing System.Collections.Generic;\nusing System.Collections.ObjectModel;\nusing Xunit;\n\nnamespace UnitTest.Core.Commons.Extensions;\n\npublic sealed class DictionaryExtensionsTest\n{\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to returns an appropriate type of empty dictionary\u0022)]\n    public void SuccessfulToReturnsAnAppropriateTypeOfEmptyDictionary()\n    {\n        IReadOnlyDictionary\u003Cstring, int\u003E result = DictionaryExtensions.Empty\u003Cstring, int\u003E();\n\n        Assert.Empty(result);\n        Assert.IsType\u003CReadOnlyDictionary\u003Cstring, int\u003E\u003E(result);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to returns an empty dictionary if the dictionary is null\u0022)]\n    public void SuccessfulToReturnsAnEmptyDictionaryIfTheDictionaryIsNull()\n    {\n        // Arrange\n        IDictionary\u003Cstring, int\u003E dictionary = null;\n\n        // Act\n        // ReSharper disable once ExpressionIsAlwaysNull\n        // ReSharper\u0027s \u0022ExpressionIsAlwaysNull\u0022 warning is intentionally triggered here to test the \n        // AsEmptyIfNull extension method\u0027s behavior with a null dictionary. The method is designed \n        // to handle null values gracefully by returning a new empty dictionary, ensuring no NullReferenceException.\n\n        IDictionary\u003Cstring, int\u003E result = dictionary.AsEmptyIfNull();\n\n        // Assert\n        Assert.True(result.Count == 0);\n    }\n}","tests":[{"id":"0503e425-5f65-3624-1d51-01e234e72c3a","name":"UnitTest.Core.Commons.Extensions.DictionaryExtensionsTest.SuccessfulToReturnsAnAppropriateTypeOfEmptyDictionary","location":{"start":{"line":10,"column":5},"end":{"line":18,"column":6}}},{"id":"d5f9f884-4d3b-bd3d-ea74-22bedefe63ce","name":"UnitTest.Core.Commons.Extensions.DictionaryExtensionsTest.SuccessfulToReturnsAnEmptyDictionaryIfTheDictionaryIsNull","location":{"start":{"line":20,"column":5},"end":{"line":37,"column":6}}}]},"/home/runner/work/fms-balance-api-netcore/fms-balance-api-netcore/src/test/UnitTest.Core/Commons/Extensions/DummyClass.cs":{"language":"cs","source":"using System;\nusing System.Diagnostics.CodeAnalysis;\n\nnamespace UnitTest.Core.Commons.Extensions;\n\n[ExcludeFromCodeCoverage]\ninternal sealed class DummyClass\n{\n    public string Foo { get; }\n    public string Bar { get; }\n\n    public DummyClass(string foo, string bar)\n    {\n        Foo = foo;\n        Bar = bar;\n    }\n\n    private bool Equals(DummyClass other)\n    {\n        return Foo == other.Foo \u0026\u0026 Bar == other.Bar;\n    }\n\n    [ExcludeFromCodeCoverage]\n    public override bool Equals(object obj)\n    {\n        return ReferenceEquals(this, obj) || obj is DummyClass other \u0026\u0026 Equals(other);\n    }\n\n    [ExcludeFromCodeCoverage]\n    public override int GetHashCode()\n    {\n        return HashCode.Combine(Foo, Bar);\n    }\n\n    [ExcludeFromCodeCoverage]\n    public override string ToString()\n    {\n        return $\u0022{nameof(Foo)}: {Foo}, {nameof(Bar)}: {Bar}\u0022;\n    }\n}","tests":[]},"/home/runner/work/fms-balance-api-netcore/fms-balance-api-netcore/src/test/UnitTest.Core/Commons/Extensions/JsonExtensionsTest.cs":{"language":"cs","source":"using System;\nusing System.Text.Json;\nusing Core.Commons.Extensions;\nusing Xunit;\n\nnamespace UnitTest.Core.Commons.Extensions;\n\npublic sealed class JsonExtensionsTest\n{\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to write json as string\u0022)]\n    public void SuccessfulToWriteJsonAsString()\n    {\n        // Arrange\n        JsonDocument jsonDocument = JsonDocument.Parse(\u0022{ \\\u0022id\\\u0022: 1,  \\\u0022Name\\\u0022: \\\u0022John\\\u0022 }\u0022);\n\n        // Act\n        string result = jsonDocument.ToJsonString();\n\n        // Assert\n        Assert.Equal(\u0022{\\\u0022id\\\u0022:1,\\\u0022Name\\\u0022:\\\u0022John\\\u0022}\u0022, result);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to write json as indented string\u0022)]\n    public void SuccessfulToWriteJsonAsIndentedString()\n    {\n        // Arrange\n        JsonDocument jsonDocument = JsonDocument.Parse(\u0022{ \\\u0022id\\\u0022: 1,  \\\u0022Name\\\u0022: \\\u0022John\\\u0022 }\u0022);\n\n        // Act\n        string result = jsonDocument.ToJsonString(true);\n\n        // Assert\n        Assert.Equal($\u0022{{{Environment.NewLine}  \\\u0022id\\\u0022: 1,{Environment.NewLine}  \\\u0022Name\\\u0022: \\\u0022John\\\u0022{Environment.NewLine}}}\u0022, result);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to deserialize Json Element\u0022)]\n    public void SuccessfulToDeserializeJsonElement()\n    {\n        // Arrange\n        JsonDocument jsonDocument = JsonDocument.Parse(\u0022{ \\\u0022Foo\\\u0022: \\\u0022Black\\\u0022,  \\\u0022Bar\\\u0022: \\\u0022White\\\u0022 }\u0022);\n        JsonElement jsonElement = jsonDocument.RootElement;\n\n        // Act\n        DummyClass result = jsonElement.ToObject\u003CDummyClass\u003E();\n\n        // Assert\n        Assert.Equal(new DummyClass(\u0022Black\u0022, \u0022White\u0022), result);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to select specific token\u0022)]\n    public void SuccessfulToSelectSpecificToken()\n    {\n        // Arrange\n        JsonDocument jsonDocument = JsonDocument.Parse(\u0022{ \\\u0022Foo\\\u0022: \\\u0022Black\\\u0022,  \\\u0022Bar\\\u0022: \\\u0022White\\\u0022 }\u0022);\n        JsonElement jsonElement = jsonDocument.RootElement;\n\n        // Act\n        JsonElement result = jsonElement.SelectToken(\u0022$.Foo\u0022);\n\n        // Assert\n        Assert.Equal(\u0022Black\u0022, result.GetString());\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to select an out of range item in array [Under Zero]\u0022)]\n    public void FailToSelectAnOutOfRangeItemInArrayUnderZero()\n    {\n        // Arrange\n        JsonDocument jsonDocument = JsonDocument.Parse(\u0022{ \\\u0022Foo\\\u0022: \\\u0022Black\\\u0022,  \\\u0022Bars\\\u0022: [ { \\\u0022Name\\\u0022: \\\u0022Red Lion\\\u0022} ] }\u0022);\n        JsonElement jsonElement = jsonDocument.RootElement;\n\n        // Act\n        ArgumentException exception = Assert.Throws\u003CArgumentException\u003E(() =\u003E\n            jsonElement.SelectToken(\u0022$.Bars[-1]\u0022));\n\n        // Assert\n        Assert.Contains(\u0022The index -1 is invalid.\u0022, exception.Message);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to select an out of range item in array [Over Max]\u0022)]\n    public void FailToSelectAnOutOfRangeItemInArrayOverMax()\n    {\n        // Arrange\n        JsonDocument jsonDocument = JsonDocument.Parse(\u0022{ \\\u0022Foo\\\u0022: \\\u0022Black\\\u0022,  \\\u0022Bars\\\u0022: [ { \\\u0022Name\\\u0022: \\\u0022Red Lion\\\u0022} ] }\u0022);\n        JsonElement jsonElement = jsonDocument.RootElement;\n\n        // Act\n        ArgumentException exception = Assert.Throws\u003CArgumentException\u003E(() =\u003E\n            jsonElement.SelectToken(\u0022$.Bars[1]\u0022));\n\n        // Assert\n        Assert.Contains(\u0022The index 1 is out of range of \u0027Bars\u0027 array. The max index is 0.\u0022, exception.Message);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to select an token item\u0022)]\n    public void SuccessfulToSelectAnTokenItem()\n    {\n        // Arrange\n        JsonDocument jsonDocument = JsonDocument.Parse(\u0022{ \\\u0022Foo\\\u0022: \\\u0022Black\\\u0022,  \\\u0022Bars\\\u0022: [ { \\\u0022Name\\\u0022: \\\u0022Red Lion\\\u0022} ] }\u0022);\n        JsonElement jsonElement = jsonDocument.RootElement;\n\n        // Act\n        JsonElement result = jsonElement.SelectToken(\u0022$.Bars[0]\u0022);\n\n        // Assert\n        Assert.Equal(\u0022Red Lion\u0022, result.GetProperty(\u0022Name\u0022).GetString());\n    }\n}","tests":[{"id":"e45a0f59-0b00-0284-01c2-7482724446db","name":"UnitTest.Core.Commons.Extensions.JsonExtensionsTest.SuccessfulToWriteJsonAsString","location":{"start":{"line":10,"column":5},"end":{"line":22,"column":6}}},{"id":"3f605a1e-5c60-953e-588b-6c93b86d0eee","name":"UnitTest.Core.Commons.Extensions.JsonExtensionsTest.SuccessfulToWriteJsonAsIndentedString","location":{"start":{"line":24,"column":5},"end":{"line":36,"column":6}}},{"id":"1bad4634-59af-80e9-4ef3-dec957cf368c","name":"UnitTest.Core.Commons.Extensions.JsonExtensionsTest.SuccessfulToDeserializeJsonElement","location":{"start":{"line":38,"column":5},"end":{"line":51,"column":6}}},{"id":"2fe4f881-5644-055b-43e8-0dc1f3efbb52","name":"UnitTest.Core.Commons.Extensions.JsonExtensionsTest.SuccessfulToSelectSpecificToken","location":{"start":{"line":53,"column":5},"end":{"line":66,"column":6}}},{"id":"0d836fd7-aa21-adb2-6896-f5ddf0dcba30","name":"UnitTest.Core.Commons.Extensions.JsonExtensionsTest.FailToSelectAnOutOfRangeItemInArrayUnderZero","location":{"start":{"line":68,"column":5},"end":{"line":82,"column":6}}},{"id":"63b15ce0-72df-87c0-5054-809c8fb4f264","name":"UnitTest.Core.Commons.Extensions.JsonExtensionsTest.FailToSelectAnOutOfRangeItemInArrayOverMax","location":{"start":{"line":84,"column":5},"end":{"line":98,"column":6}}},{"id":"bb938a16-ecaa-ae16-d507-1811f499c9a0","name":"UnitTest.Core.Commons.Extensions.JsonExtensionsTest.SuccessfulToSelectAnTokenItem","location":{"start":{"line":100,"column":5},"end":{"line":113,"column":6}}}]},"/home/runner/work/fms-balance-api-netcore/fms-balance-api-netcore/src/test/UnitTest.Core/Commons/Extensions/ListExtensionsTest.cs":{"language":"cs","source":"using Core.Commons.Extensions;\nusing Xunit;\n\nnamespace UnitTest.Core.Commons.Extensions;\n\npublic sealed class ListExtensionsTest\n{\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to returns an empty list if the list is null\u0022)]\n    [InlineData(null, new string[] { })]\n    [InlineData(new string[] { }, new string[] { })]\n    [InlineData(new[] {\u0022a\u0022, \u0022b\u0022, \u0022c\u0022}, new[] {\u0022a\u0022, \u0022b\u0022, \u0022c\u0022})]\n    public void SuccessfulToReturnsAnEmptyListIfTheListIsNull(object list, string[] expected)\n    {\n        string[] array = list as string[];\n        Assert.Equal(expected, array.AsEmptyIfNull());\n    }\n}","tests":[{"id":"bc2aa097-0f5b-c700-b3a3-daa760 ance-api-netcore/src/test/UnitTest.Core/Commons/JsonSchemaValidatorTest.cs":{"language":"cs","source":"using System.Collections.Generic;\nusing Core.Commons;\nusing Core.Commons.Models;\nusing Xunit;\n\nnamespace UnitTest.Core.Commons;\n\npublic sealed class JsonSchemaValidatorTest\n{\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate json against the schema\u0022)]\n    [InlineData\n    (\n        @\u0022{ \u0022\u0022employeeName\u0022\u0022: \u0022\u0022Arthur\u0022\u0022, \u0022\u0022department\u0022\u0022: \u0022\u0022Tech\u0022\u0022 }\u0022,\n        @\u0022{\u0022\u0022type\u0022\u0022: \u0022\u0022object\u0022\u0022, \u0022\u0022properties\u0022\u0022: {\u0022\u0022employeeName\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022string\u0022\u0022},\u0022\u0022department\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022string\u0022\u0022}},\u0022\u0022required\u0022\u0022: [\u0022\u0022employeeName\u0022\u0022,\u0022\u0022department\u0022\u0022]}\u0022\n    )]\n    [InlineData\n    (\n        @\u0022{ \u0022\u0022projectName\u0022\u0022: \u0022\u0022Falcon 6\u0022\u0022, \u0022\u0022priority\u0022\u0022: 1 }\u0022,\n        @\u0022{\u0022\u0022type\u0022\u0022: \u0022\u0022object\u0022\u0022, \u0022\u0022properties\u0022\u0022: {\u0022\u0022projectName\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022string\u0022\u0022},\u0022\u0022priority\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022integer\u0022\u0022}},\u0022\u0022required\u0022\u0022: [\u0022\u0022projectName\u0022\u0022,\u0022\u0022priority\u0022\u0022]}\u0022\n    )]\n    public void SuccessfulToValidateJsonAgainstTheSchema(string json, string jsonSchema)\n    {\n        Assert.Empty(JsonSchemaValidator.Validate(json, jsonSchema));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to list field errors if fail to validate json against the schema\u0022)]\n    public void SuccessfulToListFieldErrorsIfFailToValidateJsonAgainstTheSchema()\n    {\n        // Arrange\n        // Act\n        IList\u003CFieldError\u003E fieldErrors = JsonSchemaValidator.Validate(@\u0022{ \u0022\u0022employeeName\u0022\u0022: \u0022\u0022Arthur\u0022\u0022, \u0022\u0022age\u0022\u0022: 29 }\u0022,\n            @\u0022{\u0022\u0022type\u0022\u0022: \u0022\u0022object\u0022\u0022, \u0022\u0022properties\u0022\u0022: {\u0022\u0022employeeName\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022string\u0022\u0022},\u0022\u0022department\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022string\u0022\u0022}},\u0022\u0022required\u0022\u0022: [\u0022\u0022employeeName\u0022\u0022,\u0022\u0022department\u0022\u0022]}\u0022);\n\n        // Assert\n        Assert.NotEmpty(fieldErrors);\n        Assert.Equal(2, fieldErrors.Count);\n\n        Assert.Equal(\u0022department\u0022, fieldErrors[0].PropertyName);\n        Assert.Null(fieldErrors[0].AttemptedValue);\n        Assert.Equal(\u0022CommonJsonPropertyMissing\u0022, fieldErrors[0].ErrorMessage);\n\n        Assert.Equal(\u0022age\u0022, fieldErrors[1].PropertyName);\n        Assert.Equal(\u002229\u0022, fieldErrors[1].AttemptedValue);\n        Assert.Equal(\u0022CommonJsonPropertyInvalid\u0022, fieldErrors[1].ErrorMessage);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to list field errors if fail to match field type\u0022)]\n    public void SuccessfulToListFieldErrorsIfFailToMatchFieldType()\n    {\n        // Arrange\n        // Act\n        IList\u003CFieldError\u003E fieldErrors = JsonSchemaValidator.Validate(@\u0022{ \u0022\u0022employeeName\u0022\u0022: \u0022\u0022Arthur\u0022\u0022, \u0022\u0022age\u0022\u0022: \u0022\u0022Not an integer\u0022\u0022, \u0022\u0022department\u0022\u0022: true }\u0022,\n            @\u0022{\u0022\u0022type\u0022\u0022: \u0022\u0022object\u0022\u0022, \u0022\u0022properties\u0022\u0022: {\u0022\u0022employeeName\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022string\u0022\u0022},\u0022\u0022age\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022integer\u0022\u0022},\u0022\u0022department\u0022\u0022: {\u0022\u0022type\u0022\u0022: \u0022\u0022string\u0022\u0022}},\u0022\u0022required\u0022\u0022: [\u0022\u0022employeeName\u0022\u0022,\u0022\u0022age\u0022\u0022, \u0022\u0022department\u0022\u0022]}\u0022);\n\n        // Assert\n        Assert.NotEmpty(fieldErrors);\n        Assert.Equal(2, fieldErrors.Count);\n\n        Assert.Equal(\u0022age\u0022, fieldErrors[0].PropertyName);\n        Assert.Equal(\u0022Not an integer\u0022, fieldErrors[0].AttemptedValue);\n        Assert.Equal(\u0022CommonJsonPropertyWrongType\u0022, fieldErrors[0].ErrorMessage);\n\n        Assert.Equal(\u0022department\u0022, fieldErrors[1].PropertyName);\n        Assert.Equal(\u0022An invalid value\u0022, fieldErrors[1].AttemptedValue);\n        Assert.Equal(\u0022CommonJsonPropertyWrongType\u0022, fieldErrors[1].ErrorMessage);\n    }\n}","tests":[{"id":"91d3c659-5dc5-0f89-f98a-2815edf71e1a","name":"UnitTest.Core.Commons.JsonSchemaValidatorTest.SuccessfulToValidateJsonAgainstTheSchema","location":{"start":{"line":10,"column":5},"end":{"line":25,"column":6}}},{"id":"7d3b4021-d84c-60aa-0fd3-de0afd0c1909","name":"UnitTest.Core.Commons.JsonSchemaValidatorTest.SuccessfulToValidateJsonAgainstTheSchema","location":{"start":{"line":10,"column":5},"end":{"line":25,"column":6}}},{"id":"6d422fc6-c0d1-b4b8-7543-2ed97acf5cf5","name":"UnitTest.Core.Commons.JsonSchemaValidatorTest.SuccessfulToListFieldErrorsIfFailToValidateJsonAgainstTheSchema","location":{"start":{"line":27,"column":5},"end":{"line":47,"column":6}}},{"id":"6c238224-3317-bbbf-3674-b7b1466e34f3","name":"UnitTest.Core.Commons.JsonSchemaValidatorTest.SuccessfulToListFieldErrorsIfFailToMatchFieldType","location":{"start":{"line":49,"column":5},"end":{"line":69,"column":6}}}]},"/home/run e.Commons.Models;\nusing Xunit;\n\nnamespace UnitTest.Core.Commons.Models;\n\npublic class RangeTests\n{\n    public static TheoryData\u003CRange\u003Cint\u003E, Range\u003Cint\u003E, bool\u003E EqualRangesTestData =\u003E\n        new TheoryData\u003CRange\u003Cint\u003E, Range\u003Cint\u003E, bool\u003E\n        {\n            {Range\u003Cint\u003E.Of(1, 5), Range\u003Cint\u003E.Of(1, 5), true},\n            {Range\u003Cint\u003E.Of(1, 5), Range\u003Cint\u003E.Of(3, 7), false},\n        };\n\n    public static TheoryData\u003CRange\u003Cint\u003E, string\u003E ToStringTestData =\u003E\n        new TheoryData\u003CRange\u003Cint\u003E, string\u003E\n        {\n            {Range\u003Cint\u003E.Of(1, 5), \u0022From: 1, To: 5\u0022},\n            {default(Range\u003Cint\u003E), \u0022From: 0, To: 0\u0022},\n            {Range\u003Cint\u003E.Of(1, 1), \u0022From: 1, To: 1\u0022},\n        };\n\n    [Theory]\n    [MemberData(nameof(EqualRangesTestData))]\n    public void ShouldReturnEqualRangesIfSameFromAndToValues(Range\u003Cint\u003E range1, Range\u003Cint\u003E range2, bool expectedResult)\n    {\n        // Arrange\n        // Act\n        // Assert\n        Assert.Equal(expectedResult, range1.Equals(range2));\n    }\n\n    [Theory]\n    [MemberData(nameof(ToStringTestData))]\n    public void ToString_ShouldReturnCorrectStringRepresentation(Range\u003Cint\u003E range, string expectedString)\n    {\n        // Arrange\n        // Act\n        string actual = range.ToString();\n\n        // Assert\n        Assert.Equal(expectedString, actual);\n    }\n\n    [Theory]\n    [MemberData(nameof(EqualRangesTestData))]\n    public void GetHashCode_ShouldReturnSameHashForEqualRanges(Range\u003Cint\u003E range1, Range\u003Cint\u003E range2, bool expectedResult)\n    {\n        // Arrange\n        // Act\n        int hash1 = range1.GetHashCode();\n        int hash2 = range2.GetHashCode();\n\n        // Assert\n        Assert.Equal(expectedResult, hash1 == hash2);\n    }\n\n    [Theory]\n    [MemberData(nameof(EqualRangesTestData))]\n    public void OperatorEquality_ShouldReturnCorrectEqualityResult(Range\u003Cint\u003E range1, Range\u003Cint\u003E range2, bool expectedResult)\n    {\n        // Arrange\n        // Act\n        bool actualResult = range1 == range2;\n\n        // Assert\n        Assert.Equal(expectedResult, actualResult);\n    }\n\n    [Theory]\n    [MemberData(nameof(EqualRangesTestData))]\n    public void OperatorInequality_ShouldReturnCorrectInequalityResult(Range\u003Cint\u003E range1, Range\u003Cint\u003E range2, bool expectedResult)\n    {\n        // Arrange\n        // Act\n        bool actualResult = range1 != range2;\n\n        // Assert\n        Assert.Equal(!expectedResult, actualResult);\n    }\n}","tests":[{"id":"fd651a16-6782-01ae-107e-54243e546692","name":"UnitTest.Core.Commons.Models.RangeTests.ShouldReturnEqualRangesIfSameFromAndToValues","location":{"start":{"line":23,"column":5},"end":{"line":31,"column":6}}},{"id":"3cb5d8f9-d566-e8fa-94b5-7f15b28c80ce","name":"UnitTest.Core.Commons.Models.RangeTests.ToString_ShouldReturnCorrectStringRepresentation","location":{"start":{"line":33,"column":5},"end":{"line":43,"column":6}}},{"id":"c15fe6c5-f242-3826-c7bd-92c61f858f76","name":"UnitTest.Core.Commons.Models.RangeTests.GetHashCode_ShouldReturnSameHashForEqualRanges","location":{"start":{"line":45,"column":5},"end":{"line":56,"column":6}}},{"id":"24d1a289-c372-33fd-c9ec-efe68b26ceb9","name":"UnitTest.Core.Commons.Models.RangeTests.OperatorEquality_ShouldReturnCorrectEqualityResult","location":{"start":{"line":58,"column":5},"end":{"line":68,"column":6}}},{"id":"f090523d-108c-2466-a74c-4fca471016c4","name":"UnitTest.Core.Commons.Models.RangeTests.OperatorInequality_ShouldReturnCorrectInequalityResult","location":{"start":{"line":70,"column":5},"end":{"line":80,"column":6}}}]},"/home/runner/work/fms-balance-api-netcore/fms-balance-api-netcore/src/test/UnitTest.Core/Commons/OptionalTest.cs":{"language":"cs","source":"using System;\nusing System.Diagnostics.CodeAnalysis;\nusing Core.Commons;\nusing Xunit;\n\nnamespace UnitTest.Core.Commons;\n\npublic sealed class OptionalTest\n{\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to create an optional with no content\u0022)]\n    public void SuccessfulToCreateAnOptionalWithNoContent()\n    {\n        // Arrange\n        // Act\n        // Assert\n        Assert.False(Optional\u003CDummyClass\u003E.Empty().HasValue());\n        Assert.Equal(Optional\u003CDummyClass\u003E.Empty(), Optional\u003CDummyClass\u003E.Empty());\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to get value if optional contains content\u0022)]\n    public void SuccessfulToGetValueIfOptionalContainsContent()\n    {\n        // Arrange\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(new DummyClass(\u0022X\u0022, \u0022Y\u0022));\n\n        // Assert\n        Assert.True(optional.HasValue());\n        DummyClass dummy = optional.GetValue();\n        Assert.NotNull(dummy);\n        Assert.Equal(\u0022X\u0022, dummy.Foo);\n        Assert.Equal(\u0022Y\u0022, dummy.Bar);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to create an optional of null content\u0022)]\n    public void SuccessfulToCreateAnOptionalOfNullContent()\n    {\n        // Arrange\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(null);\n\n        // Assert\n        Assert.False(optional.HasValue());\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to get value if optional has no content\u0022)]\n    public void FailToGetValueIfOptionalHasNoContent()\n    {\n        // Arrange\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(null);\n\n        // Assert\n        InvalidOperationException exception = Assert.Throws\u003CInvalidOperationException\u003E(() =\u003E optional.GetValue());\n        Assert.Equal(\u0022No value present\u0022, exception.Message);\n    }\n\n    [ExcludeFromCodeCoverage]\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to get value if optional contains content ignoring alternative\u0022)]\n    public void SuccessfulToGetValueIfOptionalContainsContentIgnoringAlternative()\n    {\n        // Arrange\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(new DummyClass(\u0022X\u0022, \u0022Y\u0022));\n\n        // Assert\n        Assert.True(optional.HasValue());\n        Assert.Equal(new DummyClass(\u0022X\u0022, \u0022Y\u0022), optional.OrElse(new DummyClass(\u0022A\u0022, \u0022B\u0022)));\n        Assert.Equal(new DummyClass(\u0022X\u0022, \u0022Y\u0022), optional.OrElseGet(() =\u003E new DummyClass(\u0022A\u0022, \u0022B\u0022)));\n    }\n\n    [ExcludeFromCodeCoverage]\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to returns an alternative if optional has no content\u0022)]\n    public void SuccessfulToReturnsAnAlternativeIfOptionalHasNoContent()\n    {\n        // Arrange\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(null);\n\n        // Assert\n        Assert.False(optional.HasValue());\n        Assert.Equal(new DummyClass(\u0022X\u0022, \u0022Y\u0022), optional.OrElse(new DummyClass(\u0022X\u0022, \u0022Y\u0022)));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to returns an alternative if optional has no content using lambda\u0022)]\n    public void SuccessfulToReturnsAnAlternativeIfOptionalHasNoContentUsingLambda()\n    {\n        // Arrange\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(null);\n\n        // Assert\n        Assert.False(optional.HasValue());\n        Assert.Equal(new DummyClass(\u0022X\u0022, \u0022Y\u0022), optional.OrElseGet(() =\u003E new DummyClass(\u0022X\u0022, \u0022Y\u0022)));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to throws exception if the optional has no content\u0022)]\n    public void SuccessfulToThrowsExceptionIfTheOptionalHasNoContent()\n    {\n        // Arrange\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(null);\n\n        // Assert\n        Assert.False(optional.HasValue());\n        Assert.Throws\u003CException\u003E(() =\u003E\n            optional.OrElseThrow(DummyException()));\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to perform a method if the optional has content\u0022)]\n    public void SuccessfulToPerformAMethodIfTheOptionalHasContent()\n    {\n        // Arrange\n        bool flag = false;\n\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(new DummyClass(\u0022X\u0022, \u0022Y\u0022));\n\n        // Assert\n        Assert.True(optional.HasValue());\n        optional.HasValue(() =\u003E flag = true);\n        Assert.True(flag);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to perform a method with parameters if the optional has content\u0022)]\n    public void SuccessfulToPerformAMethodWithParametersIfTheOptionalHasContent()\n    {\n        // Arrange\n        bool flag = false;\n\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(new DummyClass(\u0022X\u0022, \u0022Y\u0022));\n\n        // Assert\n        Assert.True(optional.HasValue());\n        optional.HasValue(dummyClass =\u003E flag = dummyClass is not null);\n        Assert.True(flag);\n    }\n\n    [ExcludeFromCodeCoverage]\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to perform a method with parameters if the optional has no content\u0022)]\n    public void FailToPerformAMethodWithParametersIfTheOptionalHasNoContent()\n    {\n        // Arrange\n        bool flag = false;\n\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(null);\n\n        // Assert\n        Assert.False(optional.HasValue());\n        optional.HasValue(dummyClass =\u003E flag = dummyClass is null);\n        Assert.False(flag);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Fail to perform a method if the optional has no content\u0022)]\n    public void FailToPerformAMethodIfTheOptionalHasNoContent()\n    {\n        // Arrange\n        DummyStruct dummyStruct = new DummyStruct(\u0022X\u0022);\n\n        // Act\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Empty();\n\n        // Assert\n        Assert.False(optional.HasValue());\n        DummyMethod(optional, dummyStruct);\n        Assert.Equal(\u0022X\u0022, dummyStruct.Value);\n    }\n\n    [ExcludeFromCodeCoverage]\n    private static void DummyMethod(Optional\u003CDummyClass\u003E optional, DummyStruct dummyStruct)\n    {\n        optional.HasValue(() =\u003E DummyMethod(dummyStruct));\n    }\n\n    [ExcludeFromCodeCoverage]\n    private static object DummyMethod(DummyStruct dummyStruct)\n    {\n        dummyStruct.Value = \u0022Z\u0022;\n        return dummyStruct;\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Successful to get Value without throw exception if optional  contains content\u0022)]\n    public void SuccessfulToGetValueWithoutThrowExceptionIfOptionalContainsContent()\n    {\n        // Arrange\n        // Act            \n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(new DummyClass(\u0022X\u0022, \u0022Y\u0022));\n\n        // Assert            \n        Assert.True(optional.HasValue());\n        DummyClass dummy = optional.OrElseThrow(DummyException());\n        Assert.NotNull(dummy);\n        Assert.Equal(\u0022X\u0022, dummy.Foo);\n        Assert.Equal(\u0022Y\u0022, dummy.Bar);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Success to map an optional to another optional of different inner types\u0022)]\n    public void SuccessToMapAnOptionalToAnotherOptionalOfDifferentInnerTypes()\n    {\n        // Arrange\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(new DummyClass(\u0022X\u0022, \u0022Y\u0022));\n\n        // Act            \n        Optional\u003CDummyClassTwo\u003E optionalTwo = optional.Map(DummyMapper.Of);\n\n        // Assert            \n        Assert.True(optionalTwo.HasValue());\n        DummyClassTwo dummy = optionalTwo.GetValue();\n        Assert.NotNull(dummy);\n        Assert.Equal(\u0022X\u0022, dummy.Foo);\n        Assert.Equal(\u0022Y\u0022, dummy.Bar);\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Fact(DisplayName = \u0022Success to map an empty optional to another empty optional of different inner types\u0022)]\n    public void SuccessToMapAnEmptyOptionalToAnotherEmptyOptionalOfDifferentInnerTypes()\n    {\n        // Arrange\n        Optional\u003CDummyClass\u003E optional = Optional\u003CDummyClass\u003E.Of(null);\n\n        // Act            \n        Optional\u003CDummyClassTwo\u003E optionalTwo = optional.Map(DummyMapper.Of);\n\n        // Assert            \n        Assert.False(optionalTwo.HasValue());\n    }\n\n    private static Func\u003CException\u003E DummyExcep viceResolverMocker AddService\u003CT\u003E(T instance)\n    {\n        _serviceResolver\n            .Setup(self =\u003E self.Resolve\u003CT\u003E())\n            .Returns(instance);\n\n        return this;\n    }\n}","tests":[]},"/home/runner/work/fms-balance-api-netcore/fms-balance-api-netcore/src/test/UnitTest.Core/Commons/TestCaseDisplayNameComplianceTest.cs":{"language":"cs","source":"using System;\nusing System.Collections.Generic;\nusing System.Diagnostics.CodeAnalysis;\nusing System.IO;\nusing System.Linq;\nusing System.Runtime.InteropServices;\nusing System.Text;\nusing Core.Commons.Extensions;\nusing Xunit;\nusing Xunit.Abstractions;\n\nnamespace UnitTest.Core.Commons;\n\npublic sealed class TestCaseDisplayNameComplianceTest\n{\n    private const string CurrentProjectName = \u0022UnitTest.Core\u0022;\n    private static readonly string[] ExcludedDisplayNamePrefixes = [\u0022POST\u0022, \u0022GET\u0022, \u0022PUT\u0022, \u0022DELETE\u0022];\n\n    private readonly ITestOutputHelper _outputHelper;\n\n    public TestCaseDisplayNameComplianceTest(ITestOutputHelper outputHelper)\n    {\n        _outputHelper = outputHelper;\n    }\n\n    [Trait(\u0022Category\u0022, \u0022Core Business tests\u0022)]\n    [Theory(DisplayName = \u0022Successful to validate if method name and display name match\u0022, Skip = \u0022This test is not ready to run\u0022)]\n    [InlineData(\u0022[Fact(DisplayName = \\\u0022\u0022, \u0022\\\u0022)]\u0022)]\n    [InlineData(\u0022[Theory(DisplayName = \\\u0022\u0022, \u0022\\\u0022)]\u0022)]\n    public void SuccessfulToValidateIfMethodNameAndDisplayNameMatch(string stringPrefixSearch, string stringSuffixSearch)\n    {\n        // Arrange\n        string projectRootFolder = Directory.GetCurrentDirectory().SubstringBefore(CurrentProjectName);\n        string[] pathToFiles = Directory.GetFiles($\u0022{projectRootFolder}\u0022, \u0022*Test.cs\u0022, SearchOption.AllDirectories);\n\n        // Act\n        List\u003CNonCompliance\u003E nonCompliances = [];\n\n        foreach (string pathToFile in pathToFiles)\n        {\n            nonCompliances.AddRange(GetNonCompliancesByFile(projectRootFolder, pathToFile, stringPrefixSearch, stringSuffixSearch));\n        }\n\n        nonCompliances.Sort();\n\n        PrintResults(nonCompliances);\n\n        // Assert\n        Assert.True(nonCompliances.Count == 0, $\u0022Oh No! {nonCompliances.Count} non compliances were found!\u0022);\n    }\n\n    [ExcludeFromCodeCoverage]\n    private static IEnumerable\u003CNonCompliance\u003E GetNonCompliancesByFile\n    (\n    \tstring projectRootFolder,\n    \tstring pathToFile,\n    \tstring stringPrefixSearch,\n        string stringSuffixSearch\n    )\n    {\n        string location = pathToFile.SubstringAfter(projectRootFolder);\n\n        List\u003Cstring\u003E lines = File.ReadLines(pathToFile).ToList();\n\n        string displayName = string.Empty;\n        int lineNumber = 0;\n\n        List\u003CNonCompliance\u003E nonCompliances = [];\n\n        foreach (string line in CollectionsMarshal.AsSpan(lines))\n        {\n            lineNumber\u002B\u002B;\n\n            if (line.Contains(stringPrefixSearch) \u0026\u0026 line.Contains(stringSuffixSearch))\n            {\n                displayName = line.SubstringAfter(stringPrefixSearch).SubstringBefore(stringSuffixSearch);\n                if (Array.Exists(ExcludedDisplayNamePrefixes, prefix =\u003E displayName.StartsWith(prefix)))\n                {\n                    displayName = string.Empty;\n                }\n\n                continue;\n            }\n\n            if (string.IsNullOrEmpty(displayName)) continue;\n\n            if (line.Contains(\u0022[InlineData\u0022) || !line.Contains(\u0027(\u0027) || !line.Contains(\u0027)\u0027)) continue;\n\n            string methodName = line.SubstringBefore(\u0022(\u0022).SubstringAfterLast(\u0022 \u0022);\n            string methodNameAsDisplayName = GetMethodNameAsDisplayName(displayName);\n\n            if (methodName.Equals(methodNameAsDisplayName, StringComparison.InvariantCultureIgnoreCase))\n            {\n                displayName = string.Empty;\n                continue;\n            }\n\n            NonCompliance nonCompliance = new NonCompliance\n            {\n                Location = location,\n                LineNumber = lineNumber,\n                MethodName = methodName,\n                MethodNameAsDisplayName = methodNameAsDisplayName,\n                ActualDisplayName = displayName\n            };\n\n            nonCompliances.Add(nonCompliance);\n\n            displayName = string.Empty;\n        }\n\n        return nonCompliances;\n    }\n\n    [ExcludeFromCodeCoverage]\n    private void PrintResults(List\u003CNonCompliance\u003E nonCompliances)\n    {\n        foreach (NonCompliance nonCompliance in CollectionsMarshal.AsSpan(nonCompliances))\n        {\n            _outputHelper.WriteLine(\u0022Location: {0}:line {1} {2}\u0022, nonCompliance.Location, nonCompliance.LineNumber, nonCompliance.MethodName);\n            _outputHelper.WriteLine(\u0022MethodName (Actual)  : {0}\u0022, nonCompliance.MethodName);\n            _outputHelper.WriteLine(\u0022MethodName (Expected): {0} -\u003E {1}\u0022, nonCompliance.MethodNameAsDisplayName, nonCompliance.ActualDisplayName);\n            _outputHelper.WriteLine(\u0022\u0022);\n        }\n    }\n\n    [ExcludeFromCodeCoverage]\n    private static string GetMethodNameAsDisplayName(string input)\n    {\n        if (input.Length \u003C= 1) return string.Empty;\n\n        string[] words = RemoveSpecialCharacters(input).Split(\u0022 \u0022);\n        StringBuilder stringBuilder = new StringBuilder();\n\n        foreach (string element in words)\n        {\n            if (string.IsNullOrEmpty(element)) continue;\n            if (input.Length == 1)\n            {\n                stringBuilder.Append(char.ToUpperInvariant(element[0]));\n                continue;\n            }\n\n            stringBuilder.Append(c
