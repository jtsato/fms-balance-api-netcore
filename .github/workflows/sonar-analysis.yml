name: SonarCloud Integration

on:
  workflow_call:
    secrets:
      githubToken:
        required: true
      sonarToken:
        required: true

env:
  DOTNET_NOLOGO: 1 
  DOTNET_CLI_TELEMETRY_OPTOUT: 1 
  SONAR_DOTNET_ENABLE_CONCURRENT_EXECUTION: true

jobs:
  scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET [v10.0.x]
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up JDK [17]
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Start MongoDB Container
        run: docker compose -f src/test/IntegrationTest.Infra.MongoDB/docker-compose.yml up -d

      - name: Resolve dependencies
        run: dotnet restore --force --no-cache

      - name: Hack [issue "MSB3026 Unable to copy file" for EmbeddedResources]
        run: |
          mkdir -p src/test/IntegrationTest.EntryPoint.WebApi/bin/Debug/net10.0/{pt-br,en-us}
          mkdir -p src/test/IntegrationTest.EntryPoint.WebApi/bin/Release/net10.0/{pt-br,en-us}

      - name: Run Sonar Analysis and Tests
        env:
          GITHUB_TOKEN: ${{ secrets.githubToken }}
          SONAR_TOKEN: ${{ secrets.sonarToken }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin /o:"jtsato" \
            /k:"jtsato_balances-api-netcore" \
            /n:"balances-api-netcore" \
            /d:sonar.projectDescription="Balances API .NET Core" \
            /d:sonar.links.scm="https://github.com/jtsato/balances-api-netcore" \
            /d:sonar.login="${{ env.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.qualitygate.wait=false \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.dotnet.excludeTestProjects=true

          # Build occurs strictly inside the begin/end block
          dotnet build balances-api-netcore.sln --configuration Debug --no-restore

          # Run tests and collect coverage metrics
          dotnet test /p:CollectCoverage=true /p:CoverletOutputFormat=opencover --configuration Debug --no-build --nologo -v n

          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.login="${{ env.SONAR_TOKEN }}"

      - name: Environment Teardown
        if: always()
        run: |
          docker compose -f src/test/IntegrationTest.Infra.MongoDB/docker-compose.yml down -v --remove-orphans
